<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; background: #f4f7f6; color: #333; }
    .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    h2 { text-align: center; color: #2c3e50; border-bottom: 4px solid #27ae60; padding-bottom: 15px; }
    
    .header-section { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 30px; background: #f9f9f9; padding: 20px; border-radius: 10px; }
    .header-field { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 5px; }
    .header-field label { font-weight: bold; font-size: 14px; }
    
    select, input[type="text"] { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; transition: border 0.3s; }
    select:focus, input:focus { border-color: #27ae60; }

    /* Fluid Card Layout */
    .card { background: #fff; border: 1px solid #eef0f2; border-radius: 12px; padding: 20px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
    .card-title { color: #27ae60; font-weight: bold; font-size: 1.1em; margin-bottom: 20px; border-left: 5px solid #27ae60; padding-left: 10px; }
    
    /* THE FLUID GRID: minmax ensures 1 column on phone, 2-3 on laptop */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
    
    .field-group { display: flex; flex-direction: column; gap: 5px; }
    .field-group label { font-size: 13px; color: #7f8c8d; font-weight: 600; }
    
    .btn-submit { background: #27ae60; color: white; padding: 18px; border: none; cursor: pointer; width: 100%; border-radius: 10px; font-size: 18px; font-weight: bold; margin-top: 20px; transition: 0.3s; }
    .btn-submit:hover { background: #219150; }
    .btn-submit:disabled { background: #bdc3c7; cursor: not-allowed; }
    .btn-add { background: #3498db; color: white; padding: 12px 25px; border: none; cursor: pointer; border-radius: 8px; margin-bottom: 20px; font-weight: bold; }
    
    .banner { display: none; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold; }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="container">
  <h2>USULAN RKAS 2027</h2>
  <div id="statusBanner" class="banner"></div>

  <div class="header-section">
    <div class="header-field">
      <label>NAMA:</label>
      <input type="text" id="teacherName" placeholder="Nama Lengkap">
    </div>
    <div class="header-field">
      <label>JABATAN:</label>
      <select id="jabatan" onchange="toggleMapel()">
        <option value="">-- Pilih --</option>
        <option value="Guru">Guru</option>
        <option value="Tendik">Tendik</option>
      </select>
    </div>
    <div id="mapelContainer" class="header-field hidden">
      <label>MAPEL:</label>
      <select id="mapel">
        <option value="">-- Pilih Mapel --</option>
        <option>Pendidikan Agama Islam</option><option>Bahasa Indonesia</option>
        <option>Matematika</option><option>IPA</option><option>IPS</option>
        <option>Bahasa Inggris</option><option>PJOK</option><option>Informatika</option>
      </select>
    </div>
  </div>

  <div id="cardContainer"></div>
  <button class="btn-add" onclick="createCard()">+ Tambah Barang</button>
  <button class="btn-submit" id="submitBtn" onclick="processSubmission()">SUBMIT USULAN</button>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx5vWJ9Drv714IKH8ERlj02k96KMNZCJwmrZV32wi6erebueAJQAKRLd5M_pBVI_GlWAw/exec";
  let itemCount = 0;

  function createCard() {
    itemCount++;
    const container = document.getElementById('cardContainer');
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-title">DATA BARANG #${itemCount}</div>
      <div class="card-grid">
        <div class="field-group"><label>NAMA BARANG</label><input type="text" class="itemName"></div>
        <div class="field-group"><label>SPESIFIKASI</label><input type="text" class="spec"></div>
        <div class="field-group"><label>TUJUAN PENGGUNAAN</label><input type="text" class="purpose"></div>
        <div class="field-group"><label>CATATAN</label><input type="text" class="notes"></div>
        <div class="field-group"><label>FOTO (OPTIONAL)</label><input type="file" class="imageFile" accept="image/*"></div>
      </div>
    `;
    container.appendChild(card);
  }

  for(let i=0; i<5; i++) createCard();

  function toggleMapel() {
    const jab = document.getElementById('jabatan').value;
    document.getElementById('mapelContainer').classList.toggle('hidden', jab !== 'Guru');
  }

  async function compressImage(file) {
    return new Promise((res) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = (e) => {
        const img = new Image();
        img.src = e.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX = 1024;
          let w = img.width, h = img.height;
          if (w > h && w > MAX) { h *= MAX/w; w = MAX; }
          else if (h > MAX) { w *= MAX/h; h = MAX; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          res(canvas.toDataURL('image/jpeg', 0.7));
        };
      };
    });
  }

  async function processSubmission() {
    const banner = document.getElementById('statusBanner');
    const btn = document.getElementById('submitBtn');
    const name = document.getElementById('teacherName').value;
    const jab = document.getElementById('jabatan').value;
    
    if(!name || !jab) return alert("Mohon lengkapi Nama dan Jabatan!");

    const cards = document.querySelectorAll('.card');
    const payload = [];

    btn.disabled = true;
    btn.innerText = "Mengirim Data...";

    try {
      for(let card of cards) {
        const item = card.querySelector('.itemName').value.trim();
        if(item) {
          const fileInput = card.querySelector('.imageFile');
          let imgBase64 = "";
          if(fileInput.files[0]) imgBase64 = await compressImage(fileInput.files[0]);

          payload.push({
            itemName: item,
            spec: card.querySelector('.spec').value,
            purpose: card.querySelector('.purpose').value,
            notes: card.querySelector('.notes').value,
            imageFile: imgBase64
          });
        }
      }

      if(payload.length === 0) throw new Error("Mohon isi minimal 1 Nama Barang!");

      const body = new URLSearchParams();
      body.append('teacherName', name);
      body.append('jabatan', jab);
      body.append('mapel', (jab === 'Guru') ? document.getElementById('mapel').value : "-");
      body.append('tableData', JSON.stringify(payload));

      await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: body });

      showBanner("Usulan Berhasil Dikirim!", "success");
      setTimeout(() => location.reload(), 3000);

    } catch (err) {
      showBanner("Gagal: " + err.message, "error");
      btn.disabled = false;
      btn.innerText = "SUBMIT USULAN";
    }
  }

  function showBanner(msg, type) {
    const b = document.getElementById('statusBanner');
    b.innerText = msg; b.className = `banner ${type}`; b.style.display = "block";
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
